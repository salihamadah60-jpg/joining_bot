openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Telegram Multi-Account Bot Manager API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: accounts
    description: Telegram account management
  - name: auth
    description: Telegram account authentication (OTP / 2FA)
  - name: links
    description: Group links management
  - name: jobs
    description: Join job tracking
  - name: collections
    description: MongoDB collection management
  - name: bot
    description: Bot control and status
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      summary: List all Telegram accounts
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
    post:
      operationId: createAccount
      tags: [accounts]
      summary: Add a new Telegram account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

  /accounts/{id}:
    get:
      operationId: getAccount
      tags: [accounts]
      summary: Get account by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Account details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: Not found
    patch:
      operationId: updateAccount
      tags: [accounts]
      summary: Update account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
    delete:
      operationId: deleteAccount
      tags: [accounts]
      summary: Delete account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /accounts/stats:
    get:
      operationId: getAccountsStats
      tags: [accounts]
      summary: Get aggregated stats for all accounts
      responses:
        "200":
          description: Account statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountsStats"

  /auth/send-code:
    post:
      operationId: authSendCode
      tags: [auth]
      summary: Send OTP to a phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthSendCodeRequest"
      responses:
        "200":
          description: Code sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSendCodeResponse"

  /auth/verify-code:
    post:
      operationId: authVerifyCode
      tags: [auth]
      summary: Verify the OTP received on the phone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthVerifyCodeRequest"
      responses:
        "200":
          description: Verified or needs 2FA password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthVerifyCodeResponse"

  /auth/verify-password:
    post:
      operationId: authVerifyPassword
      tags: [auth]
      summary: Submit Two-Step Verification (2FA) password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthVerifyPasswordRequest"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"

  /auth/cancel:
    post:
      operationId: authCancel
      tags: [auth]
      summary: Cancel in-progress auth flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  cancelled:
                    type: boolean

  /auth/status/{phone}:
    get:
      operationId: getAuthStatus
      tags: [auth]
      summary: Get auth status for a phone number
      parameters:
        - name: phone
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatusResponse"
        "404":
          description: Account not found

  /links:
    get:
      operationId: listLinks
      tags: [links]
      summary: List all group links
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, joined, failed, skipped]
        - name: source
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupLink"
    post:
      operationId: addLink
      tags: [links]
      summary: Add a new group link manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupLink"

  /links/bulk:
    post:
      operationId: bulkAddLinks
      tags: [links]
      summary: Add multiple links at once
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkLinksInput"
      responses:
        "201":
          description: Bulk added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkAddResult"

  /links/{id}:
    delete:
      operationId: deleteLink
      tags: [links]
      summary: Delete a link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /links/stats:
    get:
      operationId: getLinksStats
      tags: [links]
      summary: Get link processing statistics
      responses:
        "200":
          description: Links statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinksStats"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List recent join jobs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: accountId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JoinJob"

  /collections:
    get:
      operationId: listCollections
      tags: [collections]
      summary: List all MongoDB collections configured as link sources
      responses:
        "200":
          description: List of collections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Collection"
    post:
      operationId: addCollection
      tags: [collections]
      summary: Add a MongoDB collection as a link source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"

  /collections/{id}:
    delete:
      operationId: deleteCollection
      tags: [collections]
      summary: Remove a collection source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /collections/{id}/sync:
    post:
      operationId: syncCollection
      tags: [collections]
      summary: Manually sync links from a MongoDB collection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"

  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get current bot running status
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/start:
    post:
      operationId: startBot
      tags: [bot]
      summary: Start the bot rotation cycle
      responses:
        "200":
          description: Started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/stop:
    post:
      operationId: stopBot
      tags: [bot]
      summary: Stop the bot rotation cycle
      responses:
        "200":
          description: Stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/activity:
    get:
      operationId: getBotActivity
      tags: [bot]
      summary: Get recent bot activity feed
      responses:
        "200":
          description: Activity log
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Account:
      type: object
      required: [id, phone, status, joinedCount, failedCount, dailyLimit, currentDelay, joinedToday, channelsCount, hasSession, isPremium, createdAt]
      properties:
        id:
          type: integer
        phone:
          type: string
        label:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, paused, banned, flood_wait, channels_limit, needs_auth]
        hasSession:
          type: boolean
          description: Whether a valid Telegram session exists
        joinedCount:
          type: integer
        failedCount:
          type: integer
        joinedToday:
          type: integer
          description: Number of groups joined today
        channelsCount:
          type: integer
          description: Total channels/groups this account is a member of
        dailyLimit:
          type: integer
          description: Max joins per 18-hour active window
        currentDelay:
          type: integer
          description: Base delay in seconds between joins for this account
        floodWaitUntil:
          type: ["string", "null"]
          description: ISO timestamp when flood wait expires
        lastJoinAt:
          type: ["string", "null"]
          description: ISO timestamp of last successful join
        isPremium:
          type: boolean
        createdAt:
          type: string

    AccountInput:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
        label:
          type: string
        isPremium:
          type: boolean
        dailyLimit:
          type: integer

    AccountUpdate:
      type: object
      properties:
        label:
          type: string
        status:
          type: string
          enum: [active, paused, banned, flood_wait, channels_limit, needs_auth]
        dailyLimit:
          type: integer
        isPremium:
          type: boolean

    AccountsStats:
      type: object
      required: [total, active, paused, banned, floodWait, needsAuth, channelsLimit, totalJoined, totalFailed]
      properties:
        total:
          type: integer
        active:
          type: integer
        paused:
          type: integer
        banned:
          type: integer
        floodWait:
          type: integer
        needsAuth:
          type: integer
        channelsLimit:
          type: integer
        totalJoined:
          type: integer
        totalFailed:
          type: integer

    AuthSendCodeRequest:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          description: Phone number in international format (e.g. +966XXXXXXXXX)

    AuthSendCodeResponse:
      type: object
      required: [sent]
      properties:
        sent:
          type: boolean
        alreadyLoggedIn:
          type: boolean
        type:
          type: string
          description: Code delivery type (app, sms, call, etc.)
        length:
          type: integer
          description: Length of the expected code
        timeout:
          type: integer
          description: Seconds before resend is allowed
        nextType:
          type: string

    AuthVerifyCodeRequest:
      type: object
      required: [phone, code]
      properties:
        phone:
          type: string
        code:
          type: string

    AuthVerifyCodeResponse:
      type: object
      required: []
      properties:
        success:
          type: boolean
        needPassword:
          type: boolean
        userId:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]

    AuthVerifyPasswordRequest:
      type: object
      required: [phone, password]
      properties:
        phone:
          type: string
        password:
          type: string

    AuthSuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        userId:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]

    AuthStatusResponse:
      type: object
      required: [phone, hasSession, status, hasPendingAuth]
      properties:
        phone:
          type: string
        hasSession:
          type: boolean
        status:
          type: string
        hasPendingAuth:
          type: boolean
        pendingStep:
          type: ["string", "null"]

    GroupLink:
      type: object
      required: [id, url, status, createdAt]
      properties:
        id:
          type: integer
        url:
          type: string
        status:
          type: string
          enum: [pending, joined, failed, skipped]
        failReason:
          type: ["string", "null"]
        groupTitle:
          type: ["string", "null"]
        groupType:
          type: ["string", "null"]
          enum: [group, channel, unknown, null]
        source:
          type: ["string", "null"]
        usedByAccountId:
          type: ["integer", "null"]
        createdAt:
          type: string
        processedAt:
          type: ["string", "null"]

    LinkInput:
      type: object
      required: [url]
      properties:
        url:
          type: string
        source:
          type: string

    BulkLinksInput:
      type: object
      required: [urls]
      properties:
        urls:
          type: array
          items:
            type: string
        source:
          type: string

    BulkAddResult:
      type: object
      required: [added, duplicates, total]
      properties:
        added:
          type: integer
        duplicates:
          type: integer
        total:
          type: integer

    LinksStats:
      type: object
      required: [total, pending, joined, failed, skipped]
      properties:
        total:
          type: integer
        pending:
          type: integer
        joined:
          type: integer
        failed:
          type: integer
        skipped:
          type: integer

    JoinJob:
      type: object
      required: [id, accountId, linkId, status, createdAt]
      properties:
        id:
          type: integer
        accountId:
          type: integer
        accountPhone:
          type: ["string", "null"]
        linkId:
          type: integer
        linkUrl:
          type: ["string", "null"]
        status:
          type: string
          enum: [success, failed, skipped, flood_wait]
        errorCode:
          type: ["string", "null"]
        errorMessage:
          type: ["string", "null"]
        createdAt:
          type: string

    Collection:
      type: object
      required: [id, name, connectionString, linkField, isActive, lastSyncAt, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        connectionString:
          type: string
        dbName:
          type: string
        linkField:
          type: string
        isActive:
          type: boolean
        lastSyncAt:
          type: ["string", "null"]
        syncedCount:
          type: integer
        createdAt:
          type: string

    CollectionInput:
      type: object
      required: [name, connectionString, dbName, linkField]
      properties:
        name:
          type: string
        connectionString:
          type: string
        dbName:
          type: string
        linkField:
          type: string
        isActive:
          type: boolean

    SyncResult:
      type: object
      required: [synced, duplicates, errors]
      properties:
        synced:
          type: integer
        duplicates:
          type: integer
        errors:
          type: integer

    BotStatus:
      type: object
      required: [running, currentAccountId, queueSize, rotationInterval, startedAt]
      properties:
        running:
          type: boolean
        currentAccountId:
          type: ["integer", "null"]
        currentAccountPhone:
          type: ["string", "null"]
        queueSize:
          type: integer
        rotationInterval:
          type: integer
          description: Safe per-account join interval in seconds (~1029s / 17.2 min)
        startedAt:
          type: ["string", "null"]
        totalJoinedToday:
          type: integer
        totalFailedToday:
          type: integer

    ActivityEntry:
      type: object
      required: [id, type, message, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [join_success, join_failed, join_skipped, flood_wait, account_switched, bot_started, bot_stopped, sync_completed]
        message:
          type: string
        accountPhone:
          type: ["string", "null"]
        linkUrl:
          type: ["string", "null"]
        errorCode:
          type: ["string", "null"]
        waitSeconds:
          type: ["integer", "null"]
        createdAt:
          type: string
